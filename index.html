<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 25px;
    }

    .btn {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.4);
    }

    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #94a3b8;
    }

    .dot {
      height: 8px;
      width: 8px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 App Running</h1>
    <p>Your Docker + npm app is live successfully</p>

    <button class="btn" onclick="checkStatus()">Check Status</button>

    <div class="status">
      <span class="dot"></span> Container Active
    </div>
  </div>

  <script>
    function checkStatus() {
      alert("Your application is running perfectly!");
    }
  </script>
</body>
</html>
