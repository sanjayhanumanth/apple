<!DOCTYPE html>
<html>
<head>
  <title>Simple App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      margin: auto;
      width: 300px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Hello 👋</h1>
    <p>Your app is running</p>
    <button onclick="alert('Working!')">Click</button>
  </div>
</body>
</html>
