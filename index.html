<!DOCTYPE html>
<html>
<head>
  <title>Simple App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #333;
    }

    p {
      color: #666;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hello from npm dev 🚀</h1>
    <p>Your simple UI is running successfully</p>
    <button onclick="alert('App is working!')">Click Me</button>
  </div>
</body>
</html>
